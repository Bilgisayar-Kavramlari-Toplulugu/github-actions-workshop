name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- . ':!*.lock' | head -c 8000)
          if [ -z "$DIFF" ]; then
            echo "Diff bos, fallback kullaniliyor"
            DIFF="Degisiklik bulunamadi"
          fi
          echo "diff<<GHEOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

      - name: Check API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret bulunamadi! Repo Settings > Secrets > Actions'a ekleyin."
            exit 1
          fi
          echo "API key mevcut (uzunluk: ${#OPENAI_API_KEY})"

      - name: Review with OpenAI
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          BODY=$(jq -n \
            --arg diff "$PR_DIFF" \
            '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "Sen deneyimli bir kod reviewer olarak PR difflerini inceliyorsun. Turkce olarak review yaz. Ozellikle sunlara bak: buglar, guvenlik aciklari, performans sorunlari, iyilestirme onerileri. Sorun yoksa kisa bir onay mesaji yaz. Sorun varsa net ve anlasilir sekilde acikla."
                },
                {
                  "role": "user",
                  "content": ("Bu PR diffini review et:\n```\n" + $diff + "\n```")
                }
              ],
              "temperature": 0.3,
              "max_tokens": 1024
            }')

          echo "API istegi gonderiliyor..."

          HTTP_CODE=$(curl -s -o /tmp/openai_response.json -w "%{http_code}" \
            "https://api.openai.com/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -d "$BODY")

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::OpenAI API hata dondurdu (HTTP $HTTP_CODE):"
            cat /tmp/openai_response.json
            REVIEW="OpenAI API hata dondurdu (HTTP $HTTP_CODE). API key ve kotayi kontrol edin."
          else
            REVIEW=$(jq -r '.choices[0].message.content // empty' /tmp/openai_response.json)
            if [ -z "$REVIEW" ]; then
              echo "::warning::API yaniti beklenen formatta degil:"
              cat /tmp/openai_response.json
              REVIEW="API yanitindan review metni cikarilamadi."
            fi
          fi

          echo "review<<GHEOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_BODY: ${{ steps.review.outputs.review }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## AI PR Review (GPT-4o-mini)

          ${REVIEW_BODY}

          ---
          *Bu review OpenAI GPT-4o-mini tarafindan otomatik olusturulmustur.*"
