name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- . ':!*.lock' | head -c 8000)
          if [ -z "$DIFF" ]; then
            echo "Diff bos, fallback kullaniliyor"
            DIFF="Degisiklik bulunamadi"
          fi
          echo "diff<<GHEOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

      - name: Check API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret bulunamadi! Repo Settings > Secrets > Actions'a ekleyin."
            exit 1
          fi
          echo "API key mevcut (uzunluk: ${#GEMINI_API_KEY})"

      - name: Review with Gemini
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          # JSON body olustur - jq ile guvenli escape
          BODY=$(jq -n \
            --arg diff "$PR_DIFF" \
            '{
              "contents": [{
                "parts": [{
                  "text": ("Sen deneyimli bir kod reviewer olarak asagidaki PR diffini incele ve Turkce olarak review yaz.\n\nOzellikle sunlara bak:\n- Buglar ve potansiyel hatalar\n- Guvenlik aciklari\n- Performans sorunlari\n- Iyilestirme onerileri\n\nSorun yoksa kisa bir onay mesaji yaz. Sorun varsa net ve anlasilir sekilde acikla.\n\nDiff:\n```\n" + $diff + "\n```")
                }]
              }],
              "generationConfig": {
                "temperature": 0.3,
                "maxOutputTokens": 1024
              }
            }')

          echo "API istegi gonderiliyor..."

          HTTP_CODE=$(curl -s -o /tmp/gemini_response.json -w "%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Gemini API hata dondurdu (HTTP $HTTP_CODE):"
            cat /tmp/gemini_response.json
            REVIEW="Gemini API hata dondurdu (HTTP $HTTP_CODE). API key ve kotayi kontrol edin."
          else
            REVIEW=$(jq -r '.candidates[0].content.parts[0].text // empty' /tmp/gemini_response.json)
            if [ -z "$REVIEW" ]; then
              echo "::warning::API yaniti beklenen formatta degil:"
              cat /tmp/gemini_response.json
              REVIEW="API yanitindan review metni cikarilmadi."
            fi
          fi

          echo "review<<GHEOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_BODY: ${{ steps.review.outputs.review }}
        run: |
          COMMENT=$(cat <<'COMMENT_EOF'
          ## Gemini AI Review

          COMMENT_EOF
          )
          COMMENT="${COMMENT}${REVIEW_BODY}

          ---
          *Bu review Gemini AI tarafindan otomatik olusturulmustur.*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
