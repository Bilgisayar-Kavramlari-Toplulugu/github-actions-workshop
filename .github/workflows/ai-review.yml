name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- . ':!*.lock' | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Review with Gemini
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          PROMPT=$(cat <<'PROMPT_EOF'
          Sen deneyimli bir kod reviewer olarak asagidaki PR diffini incele ve Turkce olarak review yaz.

          Ozellikle sunlara bak:
          - Buglar ve potansiyel hatalar
          - Guvenlik aciklari
          - Performans sorunlari
          - Iyilestirme onerileri

          Sorun yoksa kisa bir onay mesaji yaz. Sorun varsa net ve anlasilir sekilde acikla.
          PROMPT_EOF
          )

          BODY=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg diff "$PR_DIFF" \
            '{
              "contents": [{
                "parts": [{
                  "text": ($prompt + "\n\nDiff:\n```\n" + $diff + "\n```")
                }]
              }],
              "generationConfig": {
                "temperature": 0.3,
                "maxOutputTokens": 1024
              }
            }')

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Review alinamadi."')

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_BODY: ${{ steps.review.outputs.review }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Gemini AI Review

          ${REVIEW_BODY}

          ---
          *Bu review Gemini AI tarafindan otomatik olusturulmustur.*"
